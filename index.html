<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SIAKAD SD KELAS 6</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    /* 1. Pengaturan Background Utama */
    body {
        /* Menggunakan gambar lokal dari folder asset/img/ */
        background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), url('assets/img/background.png');
        
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    
    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 15px;
        margin-top: 80px;
    }

    /* 2. Ikon Lingkaran (Tema Emas/Perunggu) */
    .icon-circle {
        width: 85px;
        height: 85px;
        background: linear-gradient(135deg, #a67c52, #7a502a); /* Gradasi warna emas perunggu */
        color: white;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto -42px; /* Menarik ikon ke atas menembus batas kartu */
        position: relative;
        z-index: 10;
        border: 5px solid rgba(255, 255, 255, 0.4); /* Garis tepi semi transparan */
        box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    /* 3. Efek Kaca (Glassmorphism) untuk Kartu Login */
    .login-glass-card {
        background: rgba(255, 255, 255, 0.20) !important; /* Putih dengan transparansi 20% */
        backdrop-filter: blur(15px); /* Efek kaca buram */
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.4) !important; /* Garis tepi kaca */
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25) !important; /* Bayangan kotak */
    }

    /* 4. Penyesuaian Warna Teks */
    .text-custom-brown { color: #3e2723 !important; } /* Cokelat sangat gelap untuk judul */
    .text-custom-dark { color: #4e342e !important; }  /* Cokelat agak gelap untuk sub-judul */

    /* 5. Input Form Semi-Transparan */
    .input-group-custom {
        background: rgba(255, 255, 255, 0.7) !important;
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }
    .input-group-custom input {
        color: #333 !important;
    }
    .input-group-custom input::placeholder {
        color: #777 !important;
    }
    .input-group-custom span i {
        color: #a67c52 !important; /* Ikon warna emas */
    }
    .input-group-custom:focus-within {
        background: rgba(255, 255, 255, 0.95) !important;
        border-color: #a67c52;
        box-shadow: 0 0 0 0.25rem rgba(166, 124, 82, 0.25);
    }

    /* 6. Tombol Login Kustom */
    .btn-custom {
        background: linear-gradient(135deg, #a67c52, #7a502a);
        border: none;
        color: white;
        transition: all 0.3s ease;
    }
    .btn-custom:hover {
        background: linear-gradient(135deg, #8f6943, #613e1f);
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(122, 80, 42, 0.4);
        color: white;
    }

    /* 7. Footer Copyright (Warna Terang agar terbaca di atas background) */
    .footer-text {
        color: rgba(255, 255, 255, 0.8) !important;
    }
  </style>
</head>
<body>

  <div class="login-container">
    
    <div class="icon-circle">
        <i class="fa-solid fa-school fa-2x"></i>
    </div>
    
    <!-- Mengganti class bg-white dengan login-glass-card -->
    <div class="card login-glass-card border-0 shadow-lg rounded-4 pt-5 pb-4 px-4">
        <div class="card-body text-center mt-3">
            
            <h4 class="fw-bold text-custom-brown mb-1">Selamat Datang</h4>
            <p class="text-custom-dark medium mb-1 fw-bold">Sistem Informasi Akademik Kelas 6</p>
            <p class="text-custom-dark small mb-4 fw-bold">SD Inpres 1 Sidole</p>

            <div class="alert alert-danger py-2 small fw-bold rounded-3 shadow-sm" id="loginError" style="display: none;"></div>

            <div id="formLogin">
                
                <div class="input-group mb-3 rounded-3 overflow-hidden input-group-custom">
                    <span class="input-group-text bg-transparent border-0 px-3">
                        <i class="fa-solid fa-user"></i>
                    </span>
                    <input type="text" id="username" class="form-control bg-transparent border-0 py-2 shadow-none fw-semibold" placeholder="Nama Pengguna" autocomplete="off">
                </div>
                
                <div class="input-group mb-4 rounded-3 overflow-hidden input-group-custom">
                    <span class="input-group-text bg-transparent border-0 px-3">
                        <i class="fa-solid fa-lock"></i>
                    </span>
                    <input type="password" id="password" class="form-control bg-transparent border-0 py-2 shadow-none fw-semibold" placeholder="Kata Sandi">
                </div>
                
                <!-- Mengganti btn-primary menjadi btn-custom -->
                <button type="button" id="btnLogin" class="btn btn-custom w-100 py-2 rounded-pill fw-bold shadow-sm" style="letter-spacing: 0.5px;" onclick="window.aksiLogin(event)">
                    <i class="fa-solid fa-right-to-bracket me-2"></i>Masuk Sistem
                </button>
            </div>
            
        </div>
    </div>
    
    <div class="text-center mt-4">
        <small class="footer-text fw-semibold opacity-75">&copy; 2026 Hak Cipta Dilindungi</small>
    </div>
    
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
</body>
</html>
