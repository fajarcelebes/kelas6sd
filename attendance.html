<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Kehadiran - SD KELAS 6</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Styling kancing absensi */
    .btn-check { display: none; }
    .absen-radio-label { 
        width: 35px; height: 35px; border-radius: 50%; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; transition: all 0.2s; border: 2px solid transparent;
    }
    .btn-check:checked + label { transform: scale(1.15); border: 2px solid #333; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
  </style>
</head>
<body class="bg-light">

  <div class="d-flex">
    <div class="sidebar p-3 d-flex flex-column text-white" style="min-height: 100vh; background-color: #2c3e50; width: 250px;">
      <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary mt-2 px-2">
        <i class="fa-solid fa-school fa-xl text-info me-3"></i>
        <span class="fs-5 fw-bold text-white">SD KELAS 6</span>
      </div>
      <ul class="nav nav-pills flex-column mb-auto gap-2">
        <li><a href="dashboard.html" class="nav-link text-white"><i class="fa-solid fa-chart-pie me-2"></i> Dashboard</a></li>
        <li><a href="student.html" class="nav-link text-white"><i class="fa-solid fa-users me-2"></i> Data Siswa</a></li>
        <li><a href="attendance.html" class="nav-link text-white bg-primary"><i class="fa-solid fa-clipboard-user me-2"></i> Kehadiran</a></li>
        <li><a href="evaluation.html" class="nav-link text-white"><i class="fa-solid fa-book-open-reader me-2"></i> Penilaian & Perilaku</a></li>
      </ul>
      <hr class="border-secondary">
      <a href="#" class="nav-link text-danger fw-bold" onclick="window.aksiLogout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Keluar</a>
    </div>

    <div class="main-content flex-grow-1 bg-light">
      <header class="bg-white shadow-sm py-3 px-4 d-flex justify-content-between align-items-center mb-4">
        <h4 class="m-0 fw-bold text-dark">Manajemen Kehadiran</h4>
        <div class="d-flex align-items-center">
          <span class="text-muted small me-3" id="currentDate"></span>
          <img src="https://ui-avatars.com/api/?name=Admin&background=0D8ABC&color=fff" class="rounded-circle" width="35">
        </div>
      </header>

      <div class="container-fluid px-4">
        
        <div class="card border-0 shadow-sm rounded-4 mb-4">
            <div class="card-body p-4 d-flex align-items-end gap-3 flex-wrap">
                <div style="width: 220px;">
                    <label class="form-label small fw-bold text-secondary">Tahun Ajar</label>
                    <select id="filterTahunAjarAbsen" class="form-select form-select-lg bg-light border-0" onchange="window.muatTabelAbsensi()">
                        <option value="">Semua Tahun Ajar</option>
                    </select>
                </div>
                
                <div style="width: 220px;">
                    <label class="form-label small fw-bold text-secondary">Tanggal Kehadiran</label>
                    <input type="date" id="inputTanggalAbsen" class="form-control form-control-lg bg-light border-0">
                </div>
                
                <div>
                    <button id="btnTampilAbsen" class="btn btn-primary btn-lg rounded-3 shadow-sm px-4" onclick="window.muatTabelAbsensi()">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Tampilkan Daftar
                    </button>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 mb-4" id="areaTabelAbsensi" style="display: none;">
          <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2">
                <h5 class="fw-bold text-primary m-0"><i class="fa-solid fa-users-viewfinder me-2"></i>Daftar Absensi Siswa</h5>
                <span class="badge bg-secondary fs-6" id="labelTanggalTampil"></span>
            </div>
            
            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th class="text-secondary small fw-bold text-center" style="width: 60px;">NO</th>
                    <th class="text-secondary small fw-bold" style="width: 150px;">NISN</th>
                    <th class="text-secondary small fw-bold">NAMA LENGKAP</th>
                    <th class="text-secondary small fw-bold text-center" style="width: 250px;">STATUS</th>
                    <th class="text-secondary small fw-bold">KETERANGAN</th>
                  </tr>
                </thead>
                <tbody id="tbodyAttendance">
                  </tbody>
              </table>
            </div>

            <div class="d-flex justify-content-end mt-4 pt-3 border-top">
                <button class="btn btn-success btn-lg px-5 shadow-sm fw-bold" id="btnSimpanAbsen" onclick="window.simpanDataAbsensi()">
                    <i class="fa-solid fa-floppy-disk me-2"></i>Simpan Kehadiran Harian
                </button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/attendance.js"></script> 
  <script src="js/main.js"></script>
</body>
</html>
